name: Security Scan
on:
  push:
    branches: [main]
    paths: ['contracts/**', '.github/workflows/security.yml']
  pull_request:
    paths: ['contracts/**', '.github/workflows/security.yml']
  # Lets maintainers re-run the job manually from the Actions tab without
  # pushing a dummy contracts/ change.
  workflow_dispatch:

jobs:
  slither:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install dependencies
        working-directory: contracts
        run: npm ci
      - name: Run Slither
        uses: crytic/slither-action@v0.4.0
        with:
          target: contracts/
          slither-args: '--filter-paths "node_modules|mocks|test" --exclude-dependencies'
          # Gate merges on high-severity Slither findings. Medium/low/informational
          # findings still show up in the report but don't fail the job.
          fail-on: high
