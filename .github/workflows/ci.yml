name: CI
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  contracts:
    name: contracts (compile + full test suite)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: contracts
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: contracts/package-lock.json
      - run: npm ci
      - run: npx hardhat compile
      # Full suite — every *.test.js under test/. The Jaine V2 fork test
      # auto-skips because OG_FORK_BLOCK is not set in CI.
      - run: npx hardhat test

  sdk:
    name: sdk (test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sdk
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: sdk/package-lock.json
      - run: npm ci
      - run: npm test

  orchestrator:
    name: orchestrator (test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: orchestrator
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: orchestrator/package-lock.json
      - run: npm ci --legacy-peer-deps
      - run: npm test

  frontend:
    name: frontend (lint + test + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      # rainbowkit 2.x peer-requires wagmi 2.x but the project pins wagmi
      # 3.x; matches the resolution that setup.sh and local installs use.
      - run: npm ci --legacy-peer-deps
      - run: npm run lint
      - run: npm test
      - run: npm run build
