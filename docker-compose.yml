# Aegis Vault — local dev orchestration.
#
# Brings up orchestrator + frontend behind their production images. Secrets
# come from orchestrator/.env (see orchestrator/.env.example). Not intended
# for prod — for prod you'd run orchestrator under a process supervisor
# (pm2 / systemd / k8s Deployment) and serve the frontend bundle from a CDN.
#
# Usage:
#   cp orchestrator/.env.example orchestrator/.env  # fill in PRIVATE_KEY etc.
#   docker compose up --build
#   curl http://localhost:4002/api/health
#   open http://localhost:8080

services:
  orchestrator:
    build:
      context: ./orchestrator
    image: aegis-orchestrator:latest
    restart: unless-stopped
    env_file:
      # Use the orchestrator's own .env so `docker compose` can run from the
      # repo root without requiring a duplicate root-level .env. Previous
      # `- .env` reference made `docker compose config` warn about a missing
      # file and silently dropped every env var.
      - ./orchestrator/.env
    environment:
      PORT: 4002
      NODE_ENV: production
      # Force the orchestrator to read the deployments file from the volume
      # mount below. Default path inside the image (../../contracts/…) doesn't
      # exist because the Dockerfile build context only includes orchestrator/.
      DEPLOYMENTS_FILE: contracts/deployments-mainnet.json
      # Persist the local journal / KV / index under the bind-mounted data dir
      # below so it survives container recreate (Post-TEE remediation P0-8).
      DATA_DIR: /app/data
    ports:
      - "4002:4002"
    volumes:
      - ./orchestrator/logs:/app/logs
      # Persist orchestrator state (journal.json, kv-state.json, vault index).
      # Without this the decision journal is lost on every `docker compose up`
      # recreate — a SPOF for the post-hoc audit mirror (Post-TEE remediation
      # P0-8). Back this directory up if you rely on the local journal; the
      # authoritative audit trail remains on-chain regardless.
      - ./orchestrator/data:/app/data
      # Read-only mount of the deploy artefact. Contract addresses live here
      # and the orchestrator config falls back to it when env-var overrides
      # are absent — without this the container starts with empty registry,
      # factory, etc. addresses.
      - ./contracts/deployments-mainnet.json:/app/contracts/deployments-mainnet.json:ro

  frontend:
    build:
      context: ./frontend
      args:
        VITE_ORCHESTRATOR_URL: http://localhost:4002
        VITE_CHAIN_ID: "16661"
    image: aegis-frontend:latest
    restart: unless-stopped
    depends_on:
      - orchestrator
    ports:
      - "8080:80"
